<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Conferência PRO</title>

<script src="https://cdn.sheetjs.com/xlsx-0.20.2/package/dist/xlsx.full.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/quagga/0.12.1/quagga.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body{font-family:Arial;background:#0f172a;color:#fff;margin:0}
.container{max-width:1200px;margin:auto;padding:20px}
.card{background:#020617;border:1px solid #1e293b;margin-bottom:15px;padding:15px;border-radius:6px}
button{padding:10px;background:#2563eb;border:none;color:#fff;cursor:pointer;margin:5px}
button:hover{opacity:0.9}
input{padding:10px;margin:5px;background:#020617;border:1px solid #1e293b;color:#fff}
.ok{color:#16a34a} .err{color:#dc2626} .warn{color:#f59e0b}
#camera{width:300px;height:200px;background:#000;margin:10px 0}
canvas{max-width:300px;margin:10px 0}
</style>
</head>

<body>
<div class="container">

<div class="card">
<h3>📦 CONFERÊNCIA DE MERCADORIAS</h3>
<input type="date" id="data">
<input placeholder="Lacre" id="lacre">
<input placeholder="Loja" id="loja">
<input placeholder="Operador" id="operador">
<button onclick="iniciar()">▶ Iniciar</button>
</div>

<div id="sistema" style="display:none">

<div class="card">
<h3>📁 IMPORTAR ARQUIVOS</h3>
<input type="file" id="files" multiple accept=".xls,.xlsx,.zip">
<div id="uploadStatus"></div>
</div>

<div class="card">
<h3>🔍 SCANNER MANUAL</h3>
<input id="scanner" placeholder="Digite ou escaneie o EAN">
<div id="scanMsg"></div>
</div>

<div class="card">
<h3>📷 SCANNER COM CÂMERA</h3>
<div id="camera"></div>
<button onclick="iniciarCamera()">▶ Iniciar Câmera</button>
<button onclick="pararCamera()">⏹ Parar Câmera</button>
</div>

<div class="card">
<h3>📊 PROGRESSO</h3>
<canvas id="grafico" width="300" height="300"></canvas>
</div>

<div class="card">
<h3>📄 FINALIZAR</h3>
<button onclick="gerarRelatorio()">📑 Gerar PDF</button>
<button onclick="encerrar()" style="background:#dc2626">🔚 Encerrar</button>
</div>

<div class="card">
<h3>📋 RESUMO</h3>
<div id="resumo"></div>
</div>

</div>
</div>

<script>
// ================= DADOS =================
let dados = JSON.parse(localStorage.getItem('confSAP')) || {notas: [], fora: []};
let chart;

// ================= INICIAR =================
function iniciar(){
  let data = document.getElementById('data').value;
  let lacre = document.getElementById('lacre').value;
  let loja = document.getElementById('loja').value;
  let operador = document.getElementById('operador').value;
  
  if(!data || !lacre || !loja || !operador){
    alert('⚠️ Preencha todos os campos!');
    return;
  }
  
  document.getElementById('sistema').style.display = 'block';
  document.getElementById('scanner').focus();
}

// ================= EAN =================
function ean(v){
  let d = v.replace(/\D/g,'');
  if(d.length === 13) return d;
  if(d.length >= 10) return d;
  return null;
}

// ================= PROCESSAR EXCEL =================
function processarExcel(buffer, nomeArquivo){
  try {
    const wb = XLSX.read(buffer, {type:'array'});
    const plan = wb.Sheets[wb.SheetNames[0]];
    const linhas = XLSX.utils.sheet_to_json(plan, {header:1});
    
    if(!linhas || linhas.length < 2) return null;
    
    let itens = [];
    
    for(let i = 1; i < linhas.length; i++){
      if(!linhas[i] || !linhas[i][3]) continue;
      
      let eanRaw = String(linhas[i][3]).trim();
      let cod = ean(eanRaw);
      if(!cod) continue;
      
      itens.push({
        desc: linhas[i][1] || 'Sem descrição',
        ean: cod,
        qtd: Number(linhas[i][7]) || 0,
        conf: 0,
        codigo: linhas[i][0] || '',
        valor: Number(linhas[i][11]) || 0
      });
    }
    
    return {nome: nomeArquivo, itens: itens};
  } catch(e){
    console.error('Erro ao processar:', nomeArquivo, e);
    return null;
  }
}

// ================= IMPORTAR ARQUIVOS =================
document.getElementById('files').onchange = async function(){
  let statusDiv = document.getElementById('uploadStatus');
  statusDiv.innerHTML = '<span class="warn">⏳ Processando arquivos...</span>';
  
  dados.notas = [];
  dados.fora = [];
  let processados = 0;
  
  for(const file of this.files){
    const extensao = file.name.split('.').pop().toLowerCase();
    
    // Arquivo Excel direto
    if(extensao === 'xls' || extensao === 'xlsx'){
      const buffer = await file.arrayBuffer();
      const nota = processarExcel(buffer, file.name);
      if(nota && nota.itens.length > 0){
        dados.notas.push(nota);
        processados++;
      }
    }
    
    // Arquivo ZIP
    else if(extensao === 'zip'){
      try {
        const zip = await JSZip.loadAsync(await file.arrayBuffer());
        let encontrou = false;
        
        for(const nomeArquivo in zip.files){
          const arquivoZip = zip.files[nomeArquivo];
          
          // Pula pastas e arquivos MAC
          if(arquivoZip.dir || nomeArquivo.startsWith('__MACOSX')) continue;
          
          const nomeLower = nomeArquivo.toLowerCase();
          if(nomeLower.endsWith('.xlsx') || nomeLower.endsWith('.xls')){
            try {
              const buffer = await arquivoZip.async('arraybuffer');
              const nota = processarExcel(buffer, nomeArquivo);
              if(nota && nota.itens.length > 0){
                dados.notas.push(nota);
                encontrou = true;
              }
            } catch(e){
              console.error('Erro no arquivo ZIP:', nomeArquivo, e);
            }
          }
        }
        
        if(encontrou) processados++;
        else statusDiv.innerHTML = '<span class="warn">⚠️ ZIP sem arquivos Excel válidos</span>';
        
      } catch(e){
        console.error('Erro ao ler ZIP:', e);
        statusDiv.innerHTML = '<span class="err">❌ Erro ao ler arquivo ZIP</span>';
      }
    }
  }
  
  if(processados > 0){
    statusDiv.innerHTML = `<span class="ok">✅ ${processados} arquivo(s) processado(s) com sucesso!</span>`;
  } else {
    statusDiv.innerHTML = '<span class="err">❌ Nenhum arquivo válido encontrado!</span>';
  }
  
  salvar();
  render();
};

// ================= SCANNER =================
const scannerInput = document.getElementById('scanner');
scannerInput.addEventListener('keypress', function(e){
  if(e.key === 'Enter'){
    processarEAN(scannerInput.value);
    scannerInput.value = '';
  }
});

function processarEAN(codigo){
  let achou = false;
  let scanMsg = document.getElementById('scanMsg');
  
  for(let n = 0; n < dados.notas.length; n++){
    for(let i = 0; i < dados.notas[n].itens.length; i++){
      let item = dados.notas[n].itens[i];
      if(item.ean === codigo && item.conf < item.qtd){
        item.conf++;
        achou = true;
        break;
      }
    }
    if(achou) break;
  }
  
  if(achou){
    scanMsg.innerHTML = '<span class="ok">✅ Código conferido com sucesso!</span>';
  } else {
    // Verifica se já está na lista de fora
    let existe = false;
    for(let f = 0; f < dados.fora.length; f++){
      if(dados.fora[f].ean === codigo){
        dados.fora[f].qtd++;
        existe = true;
        break;
      }
    }
    if(!existe){
      dados.fora.push({ean: codigo, qtd: 1});
    }
    scanMsg.innerHTML = '<span class="warn">⚠️ Código não encontrado na nota fiscal!</span>';
  }
  
  setTimeout(() => { scanMsg.innerHTML = ''; }, 2000);
  salvar();
  render();
}

// ================= CAMERA =================
let cameraAtiva = false;

function iniciarCamera(){
  if(cameraAtiva) return;
  
  Quagga.init({
    inputStream: {
      type: "LiveStream",
      target: document.getElementById('camera'),
      constraints: {
        width: 300,
        height: 200,
        facingMode: "environment"
      }
    },
    decoder: {
      readers: ["ean_reader", "ean_8_reader"]
    }
  }, function(err){
    if(err){
      console.error(err);
      alert("Erro ao iniciar câmera");
      return;
    }
    Quagga.start();
    cameraAtiva = true;
  });
  
  Quagga.onDetected(function(data){
    if(data && data.codeResult && data.codeResult.code){
      processarEAN(data.codeResult.code);
    }
  });
}

function pararCamera(){
  if(cameraAtiva){
    Quagga.stop();
    cameraAtiva = false;
  }
}

// ================= GRAFICO =================
function atualizarGrafico(){
  let total = 0;
  let conf = 0;
  
  for(let n = 0; n < dados.notas.length; n++){
    for(let i = 0; i < dados.notas[n].itens.length; i++){
      total += dados.notas[n].itens[i].qtd;
      conf += dados.notas[n].itens[i].conf;
    }
  }
  
  let ctx = document.getElementById('grafico').getContext('2d');
  
  if(chart) chart.destroy();
  
  chart = new Chart(ctx, {
    type: 'doughnut',
    data: {
      labels: ['Conferidos (' + conf + ')', 'Faltam (' + (total - conf) + ')'],
      datasets: [{
        data: [conf, total - conf],
        backgroundColor: ['#16a34a', '#dc2626'],
        borderWidth: 0
      }]
    },
    options: {
      responsive: true,
      plugins: {
        legend: { position: 'bottom', labels: { color: '#fff' } }
      }
    }
  });
}

// ================= RENDER =================
function render(){
  let resumoDiv = document.getElementById('resumo');
  let h = '';
  
  if(dados.notas.length === 0){
    h = '<p style="color:#94a3b8;">Nenhuma nota carregada. Importe arquivos Excel ou ZIP.</p>';
  } else {
    for(let n = 0; n < dados.notas.length; n++){
      let nota = dados.notas[n];
      let totalNota = 0;
      let confNota = 0;
      
      for(let i = 0; i < nota.itens.length; i++){
        totalNota += nota.itens[i].qtd;
        confNota += nota.itens[i].conf;
      }
      
      let percentual = totalNota > 0 ? (confNota / totalNota * 100).toFixed(1) : 0;
      
      h += `<div style="border:1px solid #1e293b; margin:10px 0; padding:10px; border-radius:6px;">`;
      h += `<strong>📄 ${nota.nome}</strong>`;
      h += `<span style="float:right">${percentual}% (${confNota}/${totalNota})</span>`;
      h += `<div style="background:#1e293b; height:6px; margin:10px 0; border-radius:3px;">`;
      h += `<div style="background:#2563eb; width:${percentual}%; height:6px; border-radius:3px;"></div></div>`;
      
      for(let i = 0; i < nota.itens.length; i++){
        let item = nota.itens[i];
        let status = item.conf >= item.qtd ? '✅' : '⚠️';
        h += `<div style="font-size:12px; margin:5px 0;">${status} ${item.ean} - ${item.desc.substring(0,30)} - ${item.conf}/${item.qtd}</div>`;
      }
      h += `</div>`;
    }
  }
  
  if(dados.fora.length > 0){
    h += `<div style="border-left:3px solid #f59e0b; margin:10px 0; padding:10px;">`;
    h += `<strong>⚠️ Códigos não cadastrados:</strong><br>`;
    for(let f = 0; f < dados.fora.length; f++){
      h += `${dados.fora[f].ean} (${dados.fora[f].qtd}x)<br>`;
    }
    h += `</div>`;
  }
  
  resumoDiv.innerHTML = h;
  atualizarGrafico();
}

// ================= PDF =================
function gerarRelatorio(){
  const { jsPDF } = window.jspdf;
  let doc = new jsPDF();
  let y = 20;
  
  doc.setFontSize(16);
  doc.text("Relatório de Conferência", 10, y);
  y += 10;
  
  doc.setFontSize(10);
  doc.text("Data: " + (document.getElementById('data').value || 'N/A'), 10, y);
  y += 5;
  doc.text("Lacre: " + (document.getElementById('lacre').value || 'N/A'), 10, y);
  y += 5;
  doc.text("Loja: " + (document.getElementById('loja').value || 'N/A'), 10, y);
  y += 5;
  doc.text("Operador: " + (document.getElementById('operador').value || 'N/A'), 10, y);
  y += 10;
  
  for(let n = 0; n < dados.notas.length; n++){
    let nota = dados.notas[n];
    
    if(y > 270){
      doc.addPage();
      y = 20;
    }
    
    doc.text("Arquivo: " + nota.nome, 10, y);
    y += 5;
    
    for(let i = 0; i < nota.itens.length; i++){
      let item = nota.itens[i];
      let status = item.conf >= item.qtd ? 'OK' : 'PENDENTE';
      let texto = `${item.ean} - ${item.desc.substring(0,30)} - ${item.conf}/${item.qtd} - ${status}`;
      
      if(y > 280){
        doc.addPage();
        y = 20;
      }
      
      doc.text(texto, 15, y);
      y += 5;
    }
    y += 5;
  }
  
  if(dados.fora.length > 0){
    doc.text("Códigos não cadastrados:", 10, y);
    y += 5;
    for(let f = 0; f < dados.fora.length; f++){
      doc.text(`${dados.fora[f].ean} (${dados.fora[f].qtd}x)`, 15, y);
      y += 5;
    }
  }
  
  doc.save("conferencia_" + new Date().toISOString().slice(0,19) + ".pdf");
}

// ================= SALVAR =================
function salvar(){
  localStorage.setItem('confSAP', JSON.stringify(dados));
}

// ================= ENCERRAR =================
function encerrar(){
  if(confirm('⚠️ Deseja encerrar a conferência?\nO relatório será gerado antes de limpar os dados.')){
    gerarRelatorio();
    localStorage.removeItem('confSAP');
    setTimeout(() => location.reload(), 1000);
  }
}

// ================= FOCO =================
setInterval(() => {
  let sistema = document.getElementById('sistema');
  let scanner = document.getElementById('scanner');
  if(sistema && sistema.style.display === 'block'){
    scanner.focus();
  }
}, 500);

// Inicializar
render();
</script>

</body>
</html>
